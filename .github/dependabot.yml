version: 2
updates:
  # Python package dependencies
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: daily
      time: "04:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - security-team
    allow:
      - dependency-type: "minor"
      - dependency-type: "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    groups:
      minor-and-patch:
        dependency-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - security-team
