name: CI

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check identark/ tests/

      - name: Type check with mypy
        run: mypy identark/

      - name: Run unit tests
        run: pytest tests/unit/ -v --cov=identark --cov-report=xml

      - name: Run SDK benchmarks
        run: |
          pip install pytest-benchmark
          python benchmarks/benchmark_sdk_overhead.py
        continue-on-error: true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: test
    # Only runs on version tags — never on branch pushes
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/identark-sdk
    permissions:
      id-token: write   # Required for OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tools
        run: pip install build hatchling

      - name: Build distribution
        run: python -m build

      - name: Verify distribution contents
        run: |
          pip install twine
          twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No API token needed — uses OIDC trusted publisher
        # Configure once at pypi.org/manage/project/identark-sdk/settings/publishing/
